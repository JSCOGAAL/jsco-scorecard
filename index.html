<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackson Services — Daily Win Scorecard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E05C1A;
    --orange-light: #FFF0E8;
    --orange-mid: #F97316;
    --navy: #0F1E35;
    --navy-mid: #1A2E4A;
    --green: #15803D;
    --green-light: #DCFCE7;
    --green-mid: #16A34A;
    --amber: #B45309;
    --amber-light: #FEF3C7;
    --red: #B91C1C;
    --red-light: #FEE2E2;
    --border: #D1D5DB;
    --border-light: #E5E7EB;
    --bg: #ECEEF2;
    --surface: #FFFFFF;
    --text: #0F172A;
    --text-2: #374151;
    --text-3: #6B7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  .header {
    background: var(--navy);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px; position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--orange);
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 34px; height: 34px; background: var(--orange);
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
  }
  .header-logo svg { width: 18px; height: 18px; fill: white; }
  .header-title { font-size: 15px; font-weight: 600; color: white; letter-spacing: -.01em; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-date { font-size: 12px; color: rgba(255,255,255,.5); font-family: 'DM Mono', monospace; }
  .refresh-btn {
    font-size: 12px; font-family: 'DM Sans', sans-serif;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
    color: rgba(255,255,255,.85); border-radius: 6px;
    padding: 5px 14px; cursor: pointer; transition: background .15s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,.22); }

  /* ── SETTINGS BAR ───────────────────────────────────────── */
  .settings-bar {
    background: var(--navy-mid);
    border-bottom: 1px solid rgba(255,255,255,.08);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  }
  .setting-group { display: flex; align-items: center; gap: 8px; }
  .setting-label { font-size: 12px; color: rgba(255,255,255,.55); white-space: nowrap; }
  .setting-input {
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
    width: 54px; padding: 4px 8px;
    border: 1px solid rgba(255,255,255,.2); border-radius: 6px;
    color: white; text-align: center;
    background: rgba(255,255,255,.1);
  }
  .setting-input:focus { outline: 2px solid var(--orange); outline-offset: -1px; border-color: transparent; }
  .setting-input[readonly] { color: rgba(255,255,255,.4); background: rgba(255,255,255,.05); }
  .settings-bar .spacer { flex: 1; }
  .status-group { display: flex; align-items: center; gap: 7px; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ADE80; display: inline-block; animation: pulse 2s infinite;
  }
  .status-dot.error { background: #F87171; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .status-text { font-size: 12px; color: rgba(255,255,255,.5); }
  .last-updated { font-size: 11px; color: rgba(255,255,255,.35); font-family: 'DM Mono', monospace; }

  /* ── MAIN ───────────────────────────────────────────────── */
  .main { padding: 22px 24px 48px; max-width: 1240px; margin: 0 auto; }

  /* ── SECTION HEADING ────────────────────────────────────── */
  .section-heading {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px; margin-top: 8px;
  }
  .section-heading-text {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .07em; color: var(--text-2);
  }
  .section-heading-line { flex: 1; height: 1px; background: var(--border); }

  /* ── COMPANY STRIP ──────────────────────────────────────── */
  .company-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
    border-radius: 12px; overflow: hidden;
    border: 2px solid var(--navy);
    margin-bottom: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,.10);
  }
  .cs-cell {
    background: var(--surface); padding: 16px 18px;
    border-right: 1px solid var(--border);
  }
  .cs-cell:last-child { border-right: none; }
  .cs-cell.highlight { background: var(--navy); }
  .cs-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; color: var(--text-3); }
  .cs-cell.highlight .cs-label { color: rgba(255,255,255,.55); }
  .cs-value { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
  .cs-cell.highlight .cs-value { color: var(--orange); }
  .cs-note { font-size: 11px; color: var(--text-3); margin-top: 3px; }
  .cs-cell.highlight .cs-note { color: rgba(255,255,255,.4); }

  /* ── DEPT GRID — exactly 3 cols ────────────────────────── */
  .dept-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 24px;
  }

  /* ── DEPT CARD — rigid zone layout ─────────────────────── */
  .dept-card {
    border-radius: 12px; overflow: hidden;
    display: grid;
    grid-template-rows: 68px 6px 90px 58px 56px;
    box-shadow: 0 2px 6px rgba(0,0,0,.09);
    border: 1.5px solid var(--border);
    min-width: 0;
  }

  /* Card header */
  .card-hdr {
    padding: 0 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
    min-width: 0;
  }
  .card-hdr-left { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
  .card-icon {
    width: 32px; height: 32px; border-radius: 6px;
    background: rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .card-hdr-text { min-width: 0; }
  .card-name { font-size: 14px; font-weight: 700; color: white; letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sublabel { font-size: 10px; color: rgba(255,255,255,.6); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-pace-badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }
  .card-pace-badge.good { background: rgba(74,222,128,.22); color: #86EFAC; }
  .card-pace-badge.warn { background: rgba(251,191,36,.22); color: #FDE68A; }
  .card-pace-badge.bad  { background: rgba(248,113,113,.22); color: #FCA5A5; }

  /* Progress bar */
  .prog-wrap { background: #D1D5DB; }
  .prog-bar { height: 100%; transition: width .8s ease; }

  /* WIN zone */
  .win-zone {
    background: var(--surface);
    padding: 0 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    min-width: 0;
  }
  .win-main { min-width: 0; }
  .win-eyebrow { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); margin-bottom: 3px; }
  .win-amount { font-size: 26px; font-weight: 700; letter-spacing: -.03em; line-height: 1; white-space: nowrap; }
  .win-sub { font-size: 10px; color: var(--text-3); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .win-base-box { text-align: right; flex-shrink: 0; border-left: 1px solid var(--border); padding-left: 10px; }
  .win-base-label { font-size: 9px; color: var(--text-3); margin-bottom: 2px; white-space: nowrap; }
  .win-base-amt { font-size: 15px; font-weight: 700; color: var(--text-2); letter-spacing: -.02em; white-space: nowrap; }
  .win-base-note { font-size: 9px; color: var(--text-3); margin-top: 1px; white-space: nowrap; }

  /* Metrics row — 3 equal cols */
  .card-metrics {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 1px solid var(--border);
    background: #F0F2F5;
    min-width: 0;
  }
  .metric {
    padding: 0 10px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center;
    min-width: 0; overflow: hidden;
  }
  .metric:last-child { border-right: none; }
  .metric-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text-3); margin-bottom: 2px; white-space: nowrap; }
  .metric-value { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Stats row — 4 equal cols */
  .card-stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    background: var(--surface);
    min-width: 0;
  }
  .cstat {
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border-light);
    padding: 0 4px;
  }
  .cstat:last-child { border-right: none; }
  .cstat-val { font-size: 14px; font-weight: 700; color: var(--text); }
  .cstat-lbl { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text-3); margin-top: 1px; text-align: center; }

  /* ── LEAD GRID ──────────────────────────────────────────── */
  .lead-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px; margin-bottom: 24px;
  }
  .lead-cell {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 13px 15px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .lead-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); margin-bottom: 6px; }
  .lead-value { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
  .lead-note { font-size: 11px; color: var(--text-3); margin-top: 3px; }

  /* ── REP TABLE ──────────────────────────────────────────── */
  .rep-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 24px;
    box-shadow: 0 2px 6px rgba(0,0,0,.07);
  }
  .rep-card-hdr {
    background: var(--navy); padding: 12px 18px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .07em; color: rgba(255,255,255,.7);
  }
  table.rep { width: 100%; border-collapse: collapse; }
  table.rep th {
    text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .05em; color: var(--text-3);
    padding: 9px 16px; border-bottom: 2px solid var(--border);
    background: #F8F9FB;
  }
  table.rep th:not(:first-child) { text-align: right; }
  table.rep td { padding: 11px 16px; border-bottom: 1px solid var(--border-light); font-size: 13px; color: var(--text); }
  table.rep td:not(:first-child) { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; }
  table.rep tr:last-child td { border-bottom: none; }
  table.rep tbody tr:hover td { background: #F8F9FB; }
  .rep-pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; font-family: 'DM Sans', sans-serif; }
  .rep-pill.g { background: var(--green-light); color: var(--green); }
  .rep-pill.y { background: var(--amber-light); color: var(--amber); }
  .rep-pill.r { background: var(--red-light); color: var(--red); }

  /* ── LOADING / ERROR ────────────────────────────────────── */
  .loading-state {
    display: flex; align-items: center; justify-content: center;
    min-height: 320px; flex-direction: column; gap: 14px;
  }
  .spinner {
    width: 30px; height: 30px; border: 3px solid var(--border);
    border-top-color: var(--orange); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-3); }
  .error-state {
    background: var(--red-light); border: 2px solid #FECACA;
    border-radius: 10px; padding: 16px 20px; color: var(--red);
    font-size: 13px; font-weight: 500; margin-bottom: 16px;
  }

  /* ── DIVIDER ────────────────────────────────────────────── */
  hr { border: none; border-top: 2px solid var(--border); margin: 24px 0; }

  /* ── FOOTER ─────────────────────────────────────────────── */
  .footer { font-size: 11px; color: var(--text-3); text-align: center; padding-top: 8px; line-height: 1.7; }

  /* ── MOBILE ─────────────────────────────────────────────── */
  @media (max-width: 600px) {
    .main { padding: 14px 14px 36px; }
    .header, .settings-bar { padding-left: 14px; padding-right: 14px; }
    .win-amount { font-size: 28px; }
    .header-date { display: none; }
    .settings-bar { gap: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-logo">
      <svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg>
    </div>
    <div class="header-title">Jackson Services — Daily Win Scorecard</div>
  </div>
  <div class="header-right">
    <span class="header-date" id="hdr-date">—</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="settings-bar">
  <div class="setting-group">
    <span class="setting-label">Work days in month</span>
    <input class="setting-input" type="number" id="total-days" value="21" min="1" max="23" onchange="render()">
  </div>
  <div class="setting-group">
    <span class="setting-label">Days worked so far</span>
    <input class="setting-input" type="number" id="days-worked" value="20" min="0" max="23" onchange="render()">
  </div>
  <div class="setting-group">
    <span class="setting-label">Days left (incl. today)</span>
    <input class="setting-input" type="number" id="days-left" value="1" min="1" max="23" readonly style="background:#f0f0ee;color:#9CA3AF;">
  </div>
  <div class="spacer"></div>
  <div class="status-group">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-text" id="status-text">Loading...</span>
    <span class="last-updated" id="last-updated"></span>
  </div>
</div>

<div class="main">
  <div id="content">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">Pulling live data from ServiceTitan...</div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
// ─── DATA SOURCES ────────────────────────────────────────────────────────────
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRu3_K61QZOfpy1mV8iReqJxMBGG1s-3EgEjqHpCt-FNBBknZC1u5PJcZ428knPq-D3DUNGY8QP2GZU/pub?output=csv';
const LEADS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqnTF057TtgSPFKD2PJXyUNj2ruTSrjWsTDO56XGQU0hE269K7ZIxIXFItI7iPmZBHtbSAoKqEdbR5/pub?gid=628204934&single=true&output=csv';

// ─── FETCH ───────────────────────────────────────────────────────────────────
async function getCSV(url) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    const r = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (r.ok) {
      const t = await r.text();
      if (!t.trim().startsWith('<')) return t;
    }
  } catch(e) {}
  const r2 = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
  return r2.text();
}

// ─── PARSE LEADS CSV ─────────────────────────────────────────────────────────
function parseLeads(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return {};
  const headers = lines[0].split(',').map(h => h.trim());

  const parseAmt = v => { try { return parseFloat(v.replace(/[$,]/g,'')) || 0; } catch(e) { return 0; } };
  const parseDate = v => {
    const m = v.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if (!m) return null;
    const y = m[3].length === 2 ? 2000 + parseInt(m[3]) : parseInt(m[3]);
    return new Date(y, parseInt(m[1])-1, parseInt(m[2]));
  };

  const leads = [], reps = {}, months = {};
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  for (let i = 1; i < lines.length; i++) {
    // Handle quoted CSV fields
    const cols = [];
    let cur = '', inQ = false;
    for (const c of lines[i]) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    cols.push(cur.trim());

    const row = {};
    headers.forEach((h, idx) => row[h] = cols[idx] || '');

    if (row['Actual Lead']?.trim().toUpperCase() !== 'YES') continue;
    leads.push(row);

    const d = parseDate(row['Date'] || '');
    const mKey = d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` : 'unknown';
    if (!months[mKey]) months[mKey] = { leads:0, sold:0, rev:0 };
    months[mKey].leads++;

    const rep = (row['Sold By'] || '').trim() || 'Unassigned';
    if (!reps[rep]) reps[rep] = { leads:0, sold:0, open:0, rev:0 };
    reps[rep].leads++;

    const amt = parseAmt(row['Sold?'] || '');
    if (amt > 0) {
      months[mKey].sold++;
      months[mKey].rev += amt;
      reps[rep].sold++;
      reps[rep].rev += amt;
    } else {
      reps[rep].open++;
    }
  }

  const totalSold = leads.filter(r => parseAmt(r['Sold?']) > 0).length;
  const totalRev  = leads.reduce((s,r) => s + parseAmt(r['Sold?']), 0);
  const curMonth  = months[thisMonth] || { leads:0, sold:0, rev:0 };
  const allMonths = Object.entries(months)
    .filter(([k]) => k !== 'unknown')
    .sort(([a],[b]) => a.localeCompare(b));

  return {
    totalLeads: leads.length,
    totalSold,
    totalOpen: leads.length - totalSold,
    totalRev,
    avgTicket: totalSold > 0 ? Math.round(totalRev / totalSold) : 0,
    curMonth,
    allMonths,
    reps,
  };
}

async function loadData() {
  setStatus('loading');
  try {
    // Fetch both sheets in parallel
    const [huddle, leadsText] = await Promise.all([
      getCSV(SHEET_URL),
      getCSV(LEADS_URL),
    ]);
    if (!huddle || !huddle.includes('Plumbing')) throw new Error('Bad huddle data');
    liveData  = parseCSV(huddle);
    leadsData = parseLeads(leadsText);
    setStatus('ok');
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
    render();
  } catch(e) {
    setStatus('error', e.message || 'Unknown error');
  }
}

// ─── MAY 2026 BUDGET ─────────────────────────────────────────────────────────
// To update monthly: swap these numbers when you upload the next budget sheet
const BUDGET = {
  resInstall:      750000,   // Residential Replacement
  resService:      365000,   // Residential Service + Maintenance combined
  plumbing:        270000,   // Plumbing
  commInstall:     576000,   // Commercial Replacement
  commService:     407000,   // Commercial Service + Maintenance combined
  apartments:      325000,   // Apartments
};
BUDGET.residential = BUDGET.resInstall + BUDGET.resService;
BUDGET.commercial  = BUDGET.commInstall + BUDGET.commService;
BUDGET.total       = BUDGET.residential + BUDGET.plumbing + BUDGET.commercial + BUDGET.apartments;


// ─── STATE ───────────────────────────────────────────────────────────────────
let liveData  = null;
let leadsData = null;


function setStatus(state, msg) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if (state === 'ok')         { dot.className='status-dot'; text.textContent='Live'; }
  else if (state === 'error') { dot.className='status-dot error'; text.textContent='Error: ' + (msg || 'unknown'); }
  else                        { dot.className='status-dot'; text.textContent='Loading...'; }
}

// ─── PARSE CSV ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  const rows = {};
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    const name = cols[0].trim();
    if (!name || /^\d+$/.test(name)) continue; // skip totals row
    const obj = {};
    headers.forEach((h, idx) => {
      let val = (cols[idx] || '').trim().replace(/[$,%]/g, '');
      obj[h] = isNaN(val) || val === '' ? val : parseFloat(val);
    });
    rows[name] = obj;
  }
  return rows;
}

// ─── MERGE ROWS ───────────────────────────────────────────────────────────────
function sum(keys, field) {
  return keys.reduce((acc, k) => {
    const row = liveData[k];
    if (!row) return acc;
    const v = row[field];
    return acc + (typeof v === 'number' ? v : 0);
  }, 0);
}

function getDepts() {
  function merge(keys) {
    return {
      revenue:   sum(keys, 'Completed Revenue'),
      opps:      sum(keys, 'Opportunity'),
      conv:      sum(keys, 'Converted Jobs'),
      completed: sum(keys, 'Completed Jobs'),
      canceled:  sum(keys, 'Canceled Jobs'),
      recalls:   sum(keys, 'Recall Jobs'),
    };
  }

  return [
    {
      name: 'Residential Install',
      label: 'Replacement · New Systems',
      icon: '🏠',
      color: '#C2440F',
      budget: BUDGET.resInstall,
      ...merge(['HVAC Residential:AL Install','HVAC Residential:GA Install']),
    },
    {
      name: 'Residential Service',
      label: 'Demand Service + Maintenance Agreements',
      icon: '🔨',
      color: '#0369A1',
      budget: BUDGET.resService,
      ...merge(['HVAC Residential:AL Service','HVAC Residential:GA Service',
                'Residential: AL Service Agreements','Residential: GA Service Agreements']),
    },
    {
      name: 'Plumbing',
      label: 'Service + Installs',
      icon: '🔧',
      color: '#0891B2',
      budget: BUDGET.plumbing,
      ...merge(['05_Plumbing:Service']),
    },
    {
      name: 'Commercial Install',
      label: 'Replacement · New Systems',
      icon: '🏢',
      color: '#5B21B6',
      budget: BUDGET.commInstall,
      ...merge(['HVAC Mechanical:AL Install','HVAC Mechanical:GA Install']),
    },
    {
      name: 'Commercial Service',
      label: 'Service + Maintenance Agreements',
      icon: '⚙️',
      color: '#6D28D9',
      budget: BUDGET.commService,
      ...merge(['HVAC Mechanical:AL Service','HVAC Mechanical:GA Service',
                'Mechanical AL Service Agreements','Mechanical GA Service Agreements']),
    },
    {
      name: 'Apartments',
      label: 'Multi-Family Service + Install',
      icon: '🏗️',
      color: '#0F766E',
      budget: BUDGET.apartments,
      ...merge(['HVAC AL Apartments','HVAC GA Apartments']),
    },
  ];
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  if (!liveData) return;

  const totalDays  = parseInt(document.getElementById('total-days').value) || 21;
  const daysWorked = parseInt(document.getElementById('days-worked').value) || 20;
  const daysLeft   = Math.max(1, totalDays - daysWorked);
  document.getElementById('days-left').value = daysLeft;

  const depts     = getDepts();
  const totalRev  = depts.reduce((a,d) => a + d.revenue, 0);
  const totalOpps = depts.reduce((a,d) => a + d.opps, 0);
  const totalConv = depts.reduce((a,d) => a + d.conv, 0);

  const totalCatchup = Math.max(0, BUDGET.total - totalRev) / daysLeft;
  const totalBase    = BUDGET.total / totalDays;

  const fmt = n => '$' + Math.round(n).toLocaleString('en-US');

  function paceClass(actual, budget) {
    const pct = actual / budget * 100;
    if (pct >= 90) return 'good';
    if (pct >= 70) return 'warn';
    return 'bad';
  }
  function paceBadgeText(actual, budget) {
    const diff = Math.round(actual / budget * 100 - 100);
    return (diff >= 0 ? '+' : '') + diff + '% to goal';
  }

  function buildCard(d) {
    const baseDaily = d.budget / totalDays;
    const remaining = Math.max(0, d.budget - d.revenue);
    const catchup   = remaining / daysLeft;
    const barW      = Math.min(100, Math.round(d.revenue / d.budget * 100));
    const pc        = paceClass(d.revenue, d.budget);
    const convPct   = d.opps > 0 ? Math.round(d.conv / d.opps * 100) : 0;
    const avgTicket = d.completed > 0 ? d.revenue / d.completed : 0;

    return `
      <div class="dept-card">
        <div class="card-hdr" style="background:${d.color};">
          <div class="card-hdr-left">
            <div class="card-icon">${d.icon}</div>
            <div class="card-hdr-text">
              <div class="card-name">${d.name}</div>
              <div class="card-sublabel">${d.label}</div>
            </div>
          </div>
          <span class="card-pace-badge ${pc}">${paceBadgeText(d.revenue, d.budget)}</span>
        </div>

        <div class="prog-wrap">
          <div class="prog-bar" style="width:${barW}%;background:${d.color};"></div>
        </div>

        <div class="win-zone">
          <div class="win-main">
            <div class="win-eyebrow">Need today to win</div>
            <div class="win-amount" style="color:${d.color};">${fmt(catchup)}</div>
            <div class="win-sub">${fmt(remaining)} left &nbsp;÷&nbsp; ${daysLeft} day${daysLeft !== 1 ? 's' : ''} remaining</div>
          </div>
          <div class="win-base-box">
            <div class="win-base-label">Base daily goal</div>
            <div class="win-base-amt">${fmt(baseDaily)}</div>
            <div class="win-base-note">÷ ${totalDays} work days</div>
          </div>
        </div>

        <div class="card-metrics">
          <div class="metric">
            <div class="metric-label">MTD Revenue</div>
            <div class="metric-value">${fmt(d.revenue)}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Monthly Goal</div>
            <div class="metric-value">${fmt(d.budget)}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Avg Ticket</div>
            <div class="metric-value">${fmt(avgTicket)}</div>
          </div>
        </div>

        <div class="card-stats">
          <div class="cstat">
            <div class="cstat-val">${d.opps}</div>
            <div class="cstat-lbl">Opportunities</div>
          </div>
          <div class="cstat">
            <div class="cstat-val">${convPct}%</div>
            <div class="cstat-lbl">Conv. Rate</div>
          </div>
          <div class="cstat">
            <div class="cstat-val">${d.completed}</div>
            <div class="cstat-lbl">Jobs Done</div>
          </div>
          <div class="cstat">
            <div class="cstat-val">${d.canceled}</div>
            <div class="cstat-lbl">Canceled</div>
          </div>
        </div>
      </div>`;
  }

  const html = `
    ${totalRev < BUDGET.total * 0.5 && daysWorked > 5 ? '<div class="error-state">⚠️ Revenue looks low vs days worked — verify the sheet is showing the correct month.</div>' : ''}

    <div class="section-heading">
      <span class="section-heading-text">Company total</span>
      <div class="section-heading-line"></div>
    </div>
    <div class="company-strip">
      <div class="cs-cell highlight">
        <div class="cs-label">Need today (catch-up)</div>
        <div class="cs-value">${fmt(totalCatchup)}</div>
        <div class="cs-note">${fmt(Math.max(0, BUDGET.total - totalRev))} left ÷ ${daysLeft} day${daysLeft !== 1 ? 's' : ''}</div>
      </div>
      <div class="cs-cell">
        <div class="cs-label">Base daily goal</div>
        <div class="cs-value">${fmt(totalBase)}</div>
        <div class="cs-note">$${(BUDGET.total/1000).toFixed(0)}K ÷ ${totalDays} days</div>
      </div>
      <div class="cs-cell">
        <div class="cs-label">MTD revenue</div>
        <div class="cs-value">${fmt(totalRev)}</div>
        <div class="cs-note">${daysWorked} days worked</div>
      </div>
      <div class="cs-cell">
        <div class="cs-label">Monthly goal</div>
        <div class="cs-value">${fmt(BUDGET.total)}</div>
        <div class="cs-note">May 2026 budget</div>
      </div>
      <div class="cs-cell">
        <div class="cs-label">Total opps</div>
        <div class="cs-value">${totalOpps.toLocaleString()}</div>
        <div class="cs-note">${Math.round(totalConv/totalOpps*100)}% conv. rate</div>
      </div>
    </div>

    <div class="section-heading">
      <span class="section-heading-text">What each department needs today</span>
      <div class="section-heading-line"></div>
    </div>
    <div class="dept-grid">
      ${depts.map(buildCard).join('')}
    </div>

    <hr>

    <div class="section-heading">
      <span class="section-heading-text">Residential install — replacement lead tracking (live)</span>
      <div class="section-heading-line"></div>
    </div>
    <div class="lead-grid">
      <div class="lead-cell">
        <div class="lead-label">Total leads (MTD)</div>
        <div class="lead-value">${leadsData ? leadsData.curMonth.leads : '—'}</div>
        <div class="lead-note">May goal: 93 leads</div>
      </div>
      <div class="lead-cell">
        <div class="lead-label">MTD close rate</div>
        <div class="lead-value">${leadsData && leadsData.curMonth.leads > 0 ? Math.round(leadsData.curMonth.sold / leadsData.curMonth.leads * 100) + '%' : '—'}</div>
        <div class="lead-note">Target: 65%</div>
      </div>
      <div class="lead-cell">
        <div class="lead-label">Open pipeline</div>
        <div class="lead-value">${leadsData ? leadsData.totalOpen : '—'}</div>
        <div class="lead-note">Active pending leads</div>
      </div>
      <div class="lead-cell">
        <div class="lead-label">Avg ticket</div>
        <div class="lead-value">${leadsData ? fmt(leadsData.avgTicket) : '—'}</div>
        <div class="lead-note">Target $13,000</div>
      </div>
      <div class="lead-cell">
        <div class="lead-label">MTD sold</div>
        <div class="lead-value">${leadsData ? leadsData.curMonth.sold : '—'}</div>
        <div class="lead-note">May goal: 61 closes</div>
      </div>
      <div class="lead-cell">
        <div class="lead-label">MTD revenue</div>
        <div class="lead-value">${leadsData ? '$' + Math.round(leadsData.curMonth.rev / 1000) + 'K' : '—'}</div>
        <div class="lead-note">From lead sheet</div>
      </div>
    </div>

    <div class="section-heading">
      <span class="section-heading-text">Sales rep performance — residential install (live)</span>
      <div class="section-heading-line"></div>
    </div>
    <div class="rep-card">
      <div class="rep-card-hdr">Sales Rep Leaderboard — Residential Install · All Time</div>
      <table class="rep">
        <thead>
          <tr>
            <th>Rep</th><th>Leads</th><th>Sold</th><th>Open</th>
            <th>Close %</th><th>Revenue</th><th>Avg Ticket</th>
          </tr>
        </thead>
        <tbody>
          ${leadsData ? Object.entries(leadsData.reps)
            .filter(([rep]) => rep !== 'Unassigned' && rep !== 'Ben Mc')
            .sort(([,a],[,b]) => b.leads - a.leads)
            .map(([rep, v]) => {
              const total = v.sold + v.open;
              const cr = total > 0 ? Math.round(v.sold / total * 100) : 0;
              const avg = v.sold > 0 ? Math.round(v.rev / v.sold) : 0;
              const pillCls = cr >= 70 ? 'g' : cr >= 55 ? 'y' : 'r';
              return `<tr>
                <td>${rep}</td>
                <td>${v.leads}</td>
                <td>${v.sold}</td>
                <td>${v.open}</td>
                <td><span class="rep-pill ${pillCls}">${cr}%</span></td>
                <td>${fmt(v.rev)}</td>
                <td>${fmt(avg)}</td>
              </tr>`;
            }).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--text-3);">Loading lead data...</td></tr>'}
        </tbody>
      </table>
    </div>

    <div class="footer">
      Jackson Services · May 2026 · GA + AL combined · Data refreshes every 5 min · Last pull: <span id="footer-time"></span>
    </div>`;

  document.getElementById('content').innerHTML = html;
  document.getElementById('footer-time').textContent =
    new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

// ─── DAYS-LEFT AUTO CALC ─────────────────────────────────────────────────────
document.getElementById('total-days').addEventListener('input', () => {
  const t = parseInt(document.getElementById('total-days').value) || 21;
  const w = parseInt(document.getElementById('days-worked').value) || 0;
  document.getElementById('days-left').value = Math.max(1, t - w);
  render();
});
document.getElementById('days-worked').addEventListener('input', () => {
  const t = parseInt(document.getElementById('total-days').value) || 21;
  const w = parseInt(document.getElementById('days-worked').value) || 0;
  document.getElementById('days-left').value = Math.max(1, t - w);
  render();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('hdr-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

loadData();
// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
